<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PapayaGames — Fullscreen</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }
    iframe {
      width: 100vw;
      height: 100vh;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <iframe
    src="https://papayagames.netlify.app"
    allow="fullscreen; autoplay; gamepad; clipboard-read; clipboard-write"
    referrerpolicy="no-referrer"
  ></iframe>
</body>
</html>
