<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VerdaNet — Hodely</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Inter, sans-serif;
  background:#fff;
  overflow:hidden;
}

/* FULLSCREEN IFRAME */
iframe{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  border:none;
}

/* TOP BUTTONS */

.back-btn{
  position:fixed;
  top:14px;
  right:14px;
  padding:8px 14px;
  font-size:0.8rem;
  letter-spacing:1px;
  border-radius:10px;
  border:1px solid rgba(0,0,0,0.15);
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(6px);
  cursor:pointer;
  z-index:60;
  transition:all .2s ease;
}
.back-btn:hover{
  background:#000;
  color:#fff;
}

/* MENU BUTTON */

.menu-btn{
  position:fixed;
  top:14px;
  left:14px;
  width:38px;
  height:34px;
  border:1px solid rgba(0,0,0,0.12);
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(6px);
  border-radius:10px;
  cursor:pointer;
  display:grid;
  place-items:center;
  z-index:60;
  opacity:0.8;
}
.burger{
  width:18px;
  height:12px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.burger span{
  height:2px;
  background:#000;
  border-radius:2px;
}

/* SIDEBAR */

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.2);
  opacity:0;
  pointer-events:none;
  transition:.2s;
  z-index:50;
}
.overlay.show{
  opacity:1;
  pointer-events:auto;
}

.sidebar{
  position:fixed;
  top:0;
  left:0;
  width:260px;
  height:100%;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(10px);
  border-right:1px solid rgba(0,0,0,0.1);
  transform:translateX(-105%);
  transition:.25s ease;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:55;
}
.sidebar.open{
  transform:translateX(0);
}

.sidebar a{
  text-decoration:none;
  color:#000;
  padding:10px;
  border-radius:8px;
  border:1px solid rgba(0,0,0,0.1);
  font-size:0.9rem;
  transition:.15s;
}
.sidebar a:hover{
  background:#000;
  color:#fff;
}

.title{
  font-weight:800;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- MENU BUTTON -->
<button class="menu-btn" id="menuBtn">
  <div class="burger">
    <span></span><span></span><span></span>
  </div>
</button>

<!-- BACK BUTTON -->
<button class="back-btn" onclick="window.location.href='https://hodely.net'">
  Back
</button>

<!-- SIDEBAR -->
<div class="overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="title">Hodely</div>

   <nav class="nav">
      <a href="https://hodely.net" title="Go to hodely.net">
        <div class="left">
          <span class="pill">/</span>
          <span>Home</span>
        </div>
        <span class="arrow">↗</span>
      </a>

      <a href="https://hodely.net/a" title="Go to hodely.net/a">
        <div class="left">
          <span class="pill">/a</span>
          <span> A </span>
        </div>
        <span class="arrow">↗</span>
      </a>

      
      <a href="https://hodely.net/VerdaNet" title="Go to hodely.net/VerdaNet">
        <div class="left">
          <span class="pill">/VerdaNet</span>
          <span>VerdaNet</span>
        </div>
        <span class="arrow">↗</span>
      </a>

      <a href="https://hodely.net/HodelyDrive" title="Go to hodely.net/HodelyDrive">
        <div class="left">
          <span class="pill">/Drive</span>
          <span>HodelyDrive</span>
        </div>
        <span class="arrow">↗</span>
      </a>

      <a href="https://hodely.net/screenshot" title="Go to hodely.net/screenshot">
        <div class="left">
          <span class="pill">/screenshot</span>
          <span>Screenshot</span>
        </div>
        <span class="arrow">↗</span>
      </a>
      
      <a href="https://www.hodely.net/schedule" title="Go to hodely.net/schedule">
        <div class="left">
          <span class="pill">/screenshot</span>
          <span>Schedule</span>
        </div>
        <span class="arrow">↗</span>
      </a>
      
      <a href="https://hodely.net/periodictable" title="Go to hodely.net/periodictable">
        <div class="left">
          <span class="pill">/table</span>
          <span>Periodic Table</span>
        </div>
        <span class="arrow">↗</span>
      </a>
      
      <a href="https://hodely.net/HodelyOS" title="Go to hodely.net/HodelyOS">
        <div class="left">
          <span class="pill">/OS</span>
          <span>HodelyOS</span>
        </div>
        <span class="arrow">↗</span>
      </a>

      <a href="https://hodely.net/HodelyGames" title="Go to hodely.net/HodelyGames">
        <div class="left">
          <span class="pill">/Games</span>
          <span>HodelyGames</span>
        </div>
        <span class="arrow">↗</span>
      </a>
    </nav>

</aside>

<!-- FULLSCREEN IFRAME -->
<iframe src="https://moshfox.github.io/VerdaNet/"></iframe>

<script>
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

menuBtn.onclick = () => {
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
};

overlay.onclick = () => {
  sidebar.classList.remove("open");
  overlay.classList.remove("show");
};

document.addEventListener("keydown", e=>{
  if(e.key==="Escape"){
    sidebar.classList.remove("open");
    overlay.classList.remove("show");
  }
});
</script>

</body>
</html>
