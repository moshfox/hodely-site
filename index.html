<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hodely.net</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    color:#000000;
    font-family:'Inter',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
    width:100%;
}

h1{
    font-size:4rem;
    font-weight:800;
    letter-spacing:-2px;
}

h2{
    font-size:1.2rem;
    font-weight:400;
    letter-spacing:4px;
    margin-top:20px;
    opacity:0.7;
}

.marquee{
    position:relative;
    width:100%;
    overflow:hidden;
    margin:40px 0;
    font-size:2rem;
    font-weight:600;
    white-space:nowrap;
}

.marquee span{
    display:inline-block;
    padding-right:50px;
}

.marquee-top div{
    display:inline-block;
    animation: scrollLeft 20s linear infinite;
}

.marquee-bottom div{
    display:inline-block;
    animation: scrollRight 20s linear infinite;
}

@keyframes scrollLeft{
    0%{ transform: translateX(100%); }
    100%{ transform: translateX(-100%); }
}

@keyframes scrollRight{
    0%{ transform: translateX(-100%); }
    100%{ transform: translateX(100%); }
}

@media(max-width:600px){
    h1{ font-size:2.5rem; }
}
</style>
</head>
<body>

<div class="container">

    <h1>Hodely</h1>

    <div class="marquee marquee-top">
        <div>
            ⟁ ✦ H ⌘ ∆ Ø † Ξ Λ ⌁ ᚠ ⊕ ⌬ ⚑ ✧ ꙮ ⟁ ✦ H ⌘ ∆ Ø † Ξ Λ ⌁ ᚠ ⊕ ⌬ ⚑ ✧ ꙮ
        </div>
    </div>

    <div class="marquee marquee-bottom">
        <div>
            ꙮ ✧ ⚑ ⌬ ⊕ ᚠ ⌁ Λ Ξ † Ø ∆ ⌘ H ✦ ⟁ ꙮ ✧ ⚑ ⌬ ⊕ ᚠ ⌁ Λ Ξ † Ø ∆ ⌘ H ✦ ⟁
        </div>
    </div>

    <h2>Hodely.net</h2>

</div>

</body>
</html>
