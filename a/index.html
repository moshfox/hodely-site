<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A Flow — Hodely</title>

  <!-- Fuentes (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Black+Ops+One&family=Bungee&family=DM+Serif+Display&family=Fjalla+One&family=Inter:wght@400;700;900&family=Montserrat:wght@400;700;900&family=Oswald:wght@400;700&family=Playfair+Display:wght@400;700;900&family=Press+Start+2P&family=Roboto+Slab:wght@400;700;900&family=Rubik+Mono+One&family=Staatliches&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --wm: rgba(255,255,255,.06);
      --a: rgba(255,255,255,.92);
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* “Hodely” de fondo */
    .watermark{
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      user-select: none;
      z-index: 0;
      transform: translateZ(0);
    }
    .watermark span{
      font-weight: 900;
      letter-spacing: .08em;
      color: var(--wm);
      font-size: clamp(64px, 18vw, 260px);
      text-transform: uppercase;
    }

    /* Capa de las A */
    .stage{
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .a{
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--a);
      line-height: 1;
      user-select: none;
      will-change: transform, left;
      text-shadow: 0 0 18px rgba(255,255,255,.08);
      opacity: .95;
      /* Tamaño gigante que ocupa casi toda la pantalla */
      font-size: clamp(140px, 42vw, 720px);
    }

    /* Un poquito de variedad opcional */
    .a.soft { opacity: .70; }
    .a.hard { opacity: .98; }
  </style>
</head>

<body>
  <div class="watermark"><span>Hodely</span></div>
  <div class="stage" id="stage"></div>

  <script>
    const stage = document.getElementById("stage");

    const fonts = [
      "Anton, sans-serif",
      "Bebas Neue, sans-serif",
      "Black Ops One, system-ui",
      "Bungee, system-ui",
      "DM Serif Display, serif",
      "Fjalla One, sans-serif",
      "Inter, system-ui",
      "Montserrat, sans-serif",
      "Oswald, sans-serif",
      "Playfair Display, serif",
      "Press Start 2P, system-ui",
      "Roboto Slab, serif",
      "Rubik Mono One, system-ui",
      "Staatliches, sans-serif",
      "system-ui"
    ];

    // Cantidad de A (ajusta si quieres más/menos)
    const COUNT = 10;

    // Base speed (px/s) y variación
    const BASE = 260;        // velocidad media
    const AMP  = 220;        // cuánto puede subir/bajar
    const WAVE = 0.55;       // velocidad de cambio (más alto = cambia más rápido)

    const letters = [];

    function rand(min, max){ return Math.random() * (max - min) + min; }

    function createA(i){
      const el = document.createElement("div");
      el.className = "a " + (i % 3 === 0 ? "soft" : (i % 3 === 1 ? "hard" : ""));
      el.textContent = "A";
      el.style.fontFamily = fonts[i % fonts.length];

      // ligeras diferencias verticales para que no queden todas calcadas
      const y = 50 + rand(-18, 18);
      el.style.top = y + "%";

      stage.appendChild(el);

      // empezamos fuera a la derecha con separaciones
      const startX = window.innerWidth + i * (window.innerWidth * 0.22);

      letters.push({
        el,
        x: startX,
        // cada una cambia a su ritmo
        phase: rand(0, Math.PI * 2),
        mult: rand(0.75, 1.35),
        // pequeña separación extra
        gap: rand(0.12, 0.30)
      });
    }

    function resetIfOffscreen(obj){
      const rect = obj.el.getBoundingClientRect();
      if(rect.right < -40){
        obj.x = window.innerWidth + window.innerWidth * obj.gap;
        obj.phase = rand(0, Math.PI * 2);
        obj.mult = rand(0.75, 1.35);
      }
    }

    let last = performance.now();

    function tick(now){
      const dt = (now - last) / 1000;
      last = now;

      // velocidad global que “late” (cambia suave)
      const t = now / 1000;
      const globalSpeed = BASE + AMP * Math.sin(t * WAVE);

      for(const obj of letters){
        // cada A tiene su mini variación para que no vayan “en fila militar”
        const local = 1 + 0.35 * Math.sin(t * (WAVE * 1.7) + obj.phase);
        const speed = globalSpeed * obj.mult * local;

        obj.x -= speed * dt;
        obj.el.style.left = obj.x + "px";

        resetIfOffscreen(obj);
      }

      requestAnimationFrame(tick);
    }

    function rebuild(){
      stage.innerHTML = "";
      letters.length = 0;
      for(let i=0;i<COUNT;i++) createA(i);
    }

    window.addEventListener("resize", rebuild);

    rebuild();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
