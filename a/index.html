<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Hodely</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 2s ease forwards;
    }

    h1 {
      font-size: 4rem;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.7;
    }

    .dot {
      color: #00ffcc;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .glow {
      text-shadow: 0 0 20px #00ffcc55;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="glow">Hodely<span class="dot">.</span></h1>
    <p>Digital experiments in progress.</p>
  </div>
</body>
</html>
